name: app_auxilio
description: Sistema de Auxilio Vehicular - Módulo 1 (Cliente)
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Iconos de iOS
  cupertino_icons: ^1.0.2

  # Comunicación con el Backend (Módulo 4)
  http: ^1.1.0

  # Gestión de Imágenes (CU9: Adjuntar Imágenes)
  image_picker: ^1.2.1

  # Geolocalización en Tiempo Real (CU8: Enviar Ubicación)
  geolocator: ^14.0.2

  # Grabación de Audio (CU10: Enviar Audio del Incidente)
  record: ^6.2.0

  # Reproducción de Audio (Para escuchar respuestas si fuera necesario)
  audioplayers: ^6.6.0

  # Manejo de rutas y estados
  provider: ^6.0.5

  # Chat en tiempo real (CU30: WebSockets)
  socket_io_client: ^3.1.4
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Si vas a usar iconos o imágenes locales (Logo de la App)
  # assets:
  #   - assets/images/logo.png